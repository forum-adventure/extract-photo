                /* --- DUAL SLIDER RE-DESIGNED --- */
        .dual-slider-wrapper {
            position: relative;
            width: 100%;
            height: 32px;
            display: flex;
            align-items: center;
            margin: 4px 0;
            padding: 0 4px;
            box-sizing: border-box;
        }

        .slider-track {
            position: absolute;
            left: 4px;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            z-index: 1;
            pointer-events: none;
        }

        .slider-fill {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            height: 6px;
            background: linear-gradient(90deg, #03dac6, #bb86fc);
            border-radius: 4px;
            z-index: 2;
            pointer-events: none;
            transition: left 0.05s ease-out, width 0.05s ease-out;
        }

        .slider-control-input {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: none;
            pointer-events: none;
            -webkit-appearance: none;
            appearance: none;
            margin: 0;
            padding: 0;
            z-index: 3;
            outline: none;
        }

        /* Đầu kéo bên trái (Start) */
        #rangeStart::-webkit-slider-thumb {
            pointer-events: all;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ffffff;
            border: 3px solid #03dac6;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(3, 218, 198, 0.4);
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Đầu kéo bên phải (End) */
        #rangeEnd::-webkit-slider-thumb {
            pointer-events: all;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ffffff;
            border: 3px solid #bb86fc;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(187, 134, 252, 0.4);
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #rangeStart::-webkit-slider-thumb:active,
        #rangeEnd::-webkit-slider-thumb:active {
            transform: scale(1.25);
        }

        /* Hỗ trợ Firefox */
        .slider-control-input::-moz-range-thumb {
            pointer-events: all;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: 3px solid #03dac6;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        #rangeEnd::-moz-range-thumb {
            border-color: #bb86fc;
        }

    <script>
        const video = document.getElementById('videoPlayer');
        const videoInput = document.getElementById('videoInput');
        const gallery = document.getElementById('gallery');
        const galleryTitle = document.getElementById('galleryTitle');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const extractBtn = document.getElementById('extractBtn');
        const startInput = document.getElementById('start');
        const endInput = document.getElementById('end');
        const rangeStart = document.getElementById('rangeStart');
        const rangeEnd = document.getElementById('rangeEnd');
        const modeSelect = document.getElementById('modeSelect');
        const randomOptions = document.getElementById('randomOptions');
        const randomCountInput = document.getElementById('randomCount');
        const frameCountDisplay = document.getElementById('frameCount');
        const welcomeOverlay = document.getElementById('welcomeOverlay');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const overlay = document.getElementById('fullscreenOverlay');
        const fullscreenImg = document.getElementById('fullscreenImg');
        const intervalOptions = document.getElementById('intervalOptions');
        const intervalStepInput = document.getElementById('intervalStep');
        const extractLoading = document.getElementById('extractLoading');
        const stopExtractBtn = document.getElementById('stopExtractBtn');
    
    // --- THÊM CÁC BIẾN NÀY ĐỂ QUẢN LÝ TỰ ĐỘNG CUỘN ---
let isAutoScrolling = false;
let scrollIntervalId = null;

        
        let isExtracting = false; 
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        let extractedFrames = []; 
        let isPortraitVideo = false;
        let shouldStopExtract = false;

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { loadingOverlay.classList.add('fade-out'); }, 400);
        });

        function formatSeconds(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return [h, m, s].map(v => v.toString().padStart(2, '0')).join(':');
        }

        function parseTimeToSeconds(timeStr) {
            const parts = timeStr.replace(/[^0-9:]/g, '').split(':').reverse();
            let seconds = 0;
            if (parts[0]) seconds += parseInt(parts[0]) || 0;     
            if (parts[1]) seconds += (parseInt(parts[1]) || 0) * 60; 
            if (parts[2]) seconds += (parseInt(parts[2]) || 0) * 3600; 
            return seconds;
        }

        // Giải phóng dung lượng ObjectURL cũ để tránh rò rỉ bộ nhớ (Memory Leak)
                        // Giữ lại hàm này làm hàm duy nhất điều khiển việc dọn dẹp bộ nhớ
        function clearOldFrames() {
    // 1. Gỡ bỏ sự kiện và giải phóng kích thước canvas để thu hồi VRAM lập tức
    const oldCanvases = gallery.querySelectorAll('canvas');
    oldCanvases.forEach(c => {
        c.onclick = null;
        if (c._showMenuHandler) c.removeEventListener('contextmenu', c._showMenuHandler);
        if (c._touchStartHandler) c.removeEventListener('touchstart', c._touchStartHandler);
        
        // 🔥 Bí kíp giải phóng VRAM: Ép kích thước về 0
        c.width = 0;
        c.height = 0;
    });

    // 2. Đóng các đối tượng ImageBitmap
    extractedFrames.forEach(f => {
        if (f.bitmap && typeof f.bitmap.close === 'function') {
            f.bitmap.close(); 
        }
    });

    // 3. Thu hồi Object URL của ảnh Fullscreen cũ
    if (fullscreenImg.src.startsWith('blob:')) {
        URL.revokeObjectURL(fullscreenImg.src);
        fullscreenImg.src = '';
    }

    // 4. Làm rỗng giao diện và mảng lưu trữ
    gallery.innerHTML = '';
    extractedFrames = [];
}




        welcomeOverlay.addEventListener('click', () => {
    // Reset toàn bộ dữ liệu cũ và giao diện trước khi mở bảng chọn file
    clearOldFrames(); 
    
    // Đặt lại giá trị input file về rỗng để đảm bảo nếu chọn lại file trùng tên vẫn kích hoạt event 'change'
    videoInput.value = ''; 
    
    // Kích hoạt mở bảng chọn file của thiết bị
    videoInput.click();
});
        
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
            welcomeOverlay.addEventListener(evt, (e) => e.preventDefault(), false);
        });
        ['dragenter', 'dragover'].forEach(evt => {
            welcomeOverlay.addEventListener(evt, () => welcomeOverlay.classList.add('dragover'), false);
        });
        ['dragleave', 'drop'].forEach(evt => {
            welcomeOverlay.addEventListener(evt, () => welcomeOverlay.classList.remove('dragover'), false);
        });
        
        welcomeOverlay.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('video/')) {
                videoInput.files = files;
                const event = new Event('change', { bubbles: true });
                videoInput.dispatchEvent(event);
            } else {
                alert("Please drop a valid video file format!");
            }
        });

        videoInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
        clearOldFrames(); 
        
        const videoURL = URL.createObjectURL(file);
        video.src = videoURL;
        video.style.display = 'block';
        document.body.classList.add('has-video');
        galleryTitle.style.display = 'none';
        downloadAllBtn.style.display = 'none';

        // Kỹ thuật kích nổ luồng giải mã (Video Pipeline Warm-up) dành riêng cho iOS
        video.load();
        const playPromise = video.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                // Video đã được kích hoạt thành công, lập tức dừng lại để không chạy tiếp
                video.pause();
            }).catch(error => {
                console.log("iOS Video Warm-up prevented: ", error);
            });
        }
    }
});


        video.onloadedmetadata = () => {
            const duration = video.duration;
            rangeStart.max = duration;
            rangeEnd.max = duration;
            rangeStart.value = 0;
            
            // Sửa lỗi logic chặn khoảng cách nếu video ngắn hơn 5 giây
            rangeEnd.value = duration > 5 ? 5 : duration;
            
            if (video.videoHeight > video.videoWidth) {
                video.classList.add('portrait');
                isPortraitVideo = true;
            } else {
                video.classList.remove('portrait');
                isPortraitVideo = false;
            }
            
            extractBtn.disabled = false;
            updateInputsFromSliders();
        };

        function updateInputsFromSliders() {
            let valStart = parseFloat(rangeStart.value);
            let valEnd = parseFloat(rangeEnd.value);
            const maxDuration = parseFloat(rangeStart.max) || 100;
            
            // Gap tối thiểu linh hoạt dựa theo thời lượng video để tránh bị lỗi nút nhảy lố
            const minGap = maxDuration > 5 ? 1 : 0.1; 

            if (valStart > valEnd - minGap) {
                if (document.activeElement === rangeStart) {
                    rangeStart.value = Math.max(0, valEnd - minGap);
                    valStart = parseFloat(rangeStart.value);
                } else {
                    rangeEnd.value = Math.min(maxDuration, valStart + minGap);
                    valEnd = parseFloat(rangeEnd.value);
                }
            }

            const percent1 = (valStart / maxDuration) * 100;
            const percent2 = (valEnd / maxDuration) * 100;

            sliderFill.style.left = percent1 + "%";
            sliderFill.style.width = (percent2 - percent1) + "%";

            startInput.value = formatSeconds(valStart);
            endInput.value = formatSeconds(valEnd);
            updateFrameCount();
        }

        function updateFrameCount() {
            const start = parseTimeToSeconds(startInput.value);
            const end = parseTimeToSeconds(endInput.value);
            
            if (!video.src || (extractBtn.disabled && !isExtracting)) {
                extractBtn.innerText = "Select Video First";
                frameCountDisplay.innerText = "";
                return;
            }

            if (!isNaN(start) && !isNaN(end) && end >= start) {
                let count = 0;
                if (modeSelect.value === 'interval') {
                    const step = parseFloat(intervalStepInput.value) || 0.5;
                    count = Math.floor((end - start) / step) + 1;
                } else {
                    count = parseInt(randomCountInput.value) || 0;
                }
                
                extractBtn.innerText = `Extract Frames (${count} ${count > 1 ? 'images' : 'image'})`;
                frameCountDisplay.innerText = ""; 
            }
        }

                                function captureFrame(time) {
    return new Promise((resolve) => {
        let isResolved = false;
        const safeTime = Math.min(time, video.duration - 0.1);

        const onSeekEnded = async () => {
            if (isResolved) return;
            isResolved = true;
            
            video.removeEventListener('seeked', onSeekEnded);
            video.removeEventListener('ended', onSeekEnded);
            
            // Đợi 20ms để GPU kịp nạp đầy pixel vào khung hình hiện tại trước khi tạo Bitmap
            await new Promise(r => setTimeout(r, 20)); 

            try {
                const bitmap = await createImageBitmap(video);
                resolve(bitmap);
            } catch (err) {
                console.error("Lỗi tạo ImageBitmap: ", err);
                resolve(null);
            }
        };

        const timeoutId = setTimeout(() => {
            if (!isResolved) {
                isResolved = true;
                video.removeEventListener('seeked', onSeekEnded);
                video.removeEventListener('ended', onSeekEnded);
                console.warn(`Bỏ qua khung hình tại ${safeTime}s do trình duyệt nghẽn.`);
                resolve(null);
            }
        }, 1200); // Tăng timeout lên 1200ms để chờ các máy cấu hình thấp

        video.addEventListener('seeked', onSeekEnded);
        video.addEventListener('ended', onSeekEnded);
        video.currentTime = safeTime;
    });
}





        stopExtractBtn.addEventListener('click', () => {
            shouldStopExtract = true;
            stopExtractBtn.innerText = "⏳ Stopping...";
            stopExtractBtn.disabled = true;
        });

                extractBtn.addEventListener('click', async () => {
            const startTime = parseTimeToSeconds(startInput.value);
            const endTime = parseTimeToSeconds(endInput.value);
            if (endTime <= startTime) return alert("End time must be greater than start time!");

            shouldStopExtract = false;
            stopExtractBtn.innerText = "STOP EXTRACTION";
            stopExtractBtn.disabled = false;
            isExtracting = true;
            
            clearOldFrames(); // Xóa bộ nhớ cũ
                
            downloadAllBtn.style.display = 'none';
            galleryTitle.style.display = 'none';
            extractBtn.style.display = 'none'; 
            extractLoading.style.display = 'flex'; 

            document.querySelector('.controls').classList.add('disabled-all');

            let timestamps = [];
            if (modeSelect.value === 'interval') {
                const step = parseFloat(intervalStepInput.value) || 0.5;
                for (let t = startTime; t <= endTime; t += step) {
                    timestamps.push(t);
                }
            } else {
                const count = parseInt(randomCountInput.value);
                for (let i = 0; i < count; i++) {
                    timestamps.push(Math.random() * (endTime - startTime) + startTime);
                }
                timestamps.sort((a, b) => a - b);
            }
                
                const totalFrames = timestamps.length; // 1. Lấy tổng số lượng ảnh cần trích xuất
            const extractTextSpan = extractLoading.querySelector('span'); // 2. Lấy thẻ hiển thị chữ "Extracting..."
            extractTextSpan.innerText = `Extracting... (0/${totalFrames})`; // 3. Đặt trạng thái ban đầu là 0 ảnh

            galleryTitle.style.display = 'block';

            isAutoScrolling = true;
            scrollIntervalId = setInterval(() => {
                if (isAutoScrolling) {
                    window.scrollTo({
                        top: document.documentElement.scrollHeight,
                        behavior: 'smooth'
                    });
                }
            }, 150); // Tăng giãn cách để giảm tải CPU render

            let renderCounter = 0;

            let currentFrameCount = 0; // 1. THÊM DÒNG NÀY: Khởi tạo biến đếm số ảnh chạy thành công

            for (const t of timestamps) {
                if (shouldStopExtract) break; 

                // Nhận về ImageBitmap siêu nhẹ từ GPU
                const bitmap = await captureFrame(t);
                if (!bitmap) continue; 

                // --- ĐOẠN THÊM MỚI BẮT ĐẦU ---
                currentFrameCount++; // 2. Tăng số đếm lên 1 khi có ảnh hợp lệ
                extractTextSpan.innerText = `Extracting... (${currentFrameCount}/${totalFrames})`; // 3. Cập nhật giao diện real-time
                // --- ĐOẠN THÊM MỚI KẾT THÚC ---

                const filename = `frame_${t.toFixed(2)}s.png`;

                // Lưu đối tượng bitmap vào mảng để dùng khi tải ZIP
                extractedFrames.push({ bitmap, filename, timestamp: t });

                const div = document.createElement('div');
                div.className = 'frame-item';
                
                // 1. Dùng canvas nhỏ làm ảnh Thumbnail nháp để không tốn RAM sinh URL Blob
                // 1. Nâng độ phân giải Thumbnail nháp lên 350px để nét hơn trên màn hình Mobile cao cấp
                // 1. Dùng canvas nhỏ làm ảnh Thumbnail nháp để không tốn RAM sinh URL Blob
                const thumbCanvas = document.createElement('canvas');
                thumbCanvas.width = video.videoWidth;   
                thumbCanvas.height = video.videoHeight; 
                const thumbCtx = thumbCanvas.getContext('2d');
                thumbCtx.imageSmoothingEnabled = true;
                thumbCtx.imageSmoothingQuality = 'high';
                thumbCtx.drawImage(bitmap, 0, 0, thumbCanvas.width, thumbCanvas.height);

                // Click nhanh: Mở xem Fullscreen bình thường
                ((currentBitmap) => {
                    thumbCanvas.onclick = (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        renderHighResToElement(currentBitmap, fullscreenImg);
                        overlay.style.display = 'flex';
                    };
                })(bitmap);
                
                // ---                 // --- LOGIC XỬ LÝ BẤM GIỮ (LONG PRESS) & CHUỘT PHẢI ---
                let pressTimer;
                
                const showMenuHandler = (e) => {
                    e.preventDefault();
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    openCustomMenu(clientX, clientY, bitmap, filename);
                };

                // Lưu tham chiếu hàm vào đối tượng canvas để dọn dẹp triệt để về sau
                thumbCanvas._showMenuHandler = showMenuHandler;

                thumbCanvas.addEventListener('contextmenu', showMenuHandler);

                // Lưu tham chiếu touchstart để gỡ bỏ khi xóa ảnh
                thumbCanvas._touchStartHandler = (e) => {
                    pressTimer = setTimeout(() => {
                        showMenuHandler(e);
                    }, 600);
                };

                // ĐOẠN MỚI ĐÃ SỬA CHỮA:
thumbCanvas.addEventListener('touchstart', (e) => {
    // NẾU CÓ TỪ 2 NGÓN TAY TRỞ LÊN (ĐANG ZOOM): Hủy ngay lập tức không cho hiện Menu
    if (e.touches.length > 1) {
        clearTimeout(pressTimer);
        return;
    }
    // Nếu chỉ có 1 ngón tay, kích hoạt bộ đếm thời gian Long Press như bình thường
    thumbCanvas._touchStartHandler(e);
}, { passive: false });

thumbCanvas.addEventListener('touchend', () => clearTimeout(pressTimer));

thumbCanvas.addEventListener('touchmove', (e) => {
    // Đề phòng trường hợp đang giữ 1 ngón rồi đặt tiếp ngón thứ 2 vào để zoom
    if (e.touches.length > 1) {
        clearTimeout(pressTimer);
    }
});


                // 2. Tạo khu vực hiển thị thời gian đơn giản dưới đáy ảnh
                const info = document.createElement('div');
                info.className = 'info';
                info.innerText = `${t.toFixed(2)}s`;
                
                div.appendChild(thumbCanvas);
                div.appendChild(info);
                gallery.appendChild(div);


                // Throttling Render: Cứ 3 ảnh cho máy nghỉ 10ms tránh nghẽn
                renderCounter++;
                if (renderCounter % 3 === 0) {
                    await new Promise(resolve => setTimeout(resolve, 10));
                }
            }

            if (extractedFrames.length > 0) {
                downloadAllBtn.style.display = 'inline-block';
            } else {
                galleryTitle.style.display = 'none';
            }

            isAutoScrolling = false;
            if (scrollIntervalId) {
                clearInterval(scrollIntervalId);
                scrollIntervalId = null;
            }

            extractLoading.style.display = 'none';
            extractBtn.style.display = 'inline-flex';
            isExtracting = false;
            extractBtn.disabled = false;
            document.querySelector('.controls').classList.remove('disabled-all');
            updateFrameCount();
        });

    
    
    

                downloadAllBtn.addEventListener('click', async () => {
            const originalText = downloadAllBtn.innerText;
            downloadAllBtn.disabled = true;
            downloadAllBtn.innerText = "⏳ Compressing ZIP...";
            
            const zip = new JSZip();
            
            // Chạy vòng lặp dựng canvas để nén hàng loạt khi đóng gói ZIP
            // Chạy vòng lặp dựng canvas để nén hàng loạt khi đóng gói ZIP
            for (const f of extractedFrames) {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = video.videoWidth;
                tempCanvas.height = video.videoHeight;
                const tempCtx = tempCanvas.getContext('2d');
                tempCtx.drawImage(f.bitmap, 0, 0);
                
                const blob = await new Promise(resolve => {
                    tempCanvas.toBlob(resolve, "image/png"); 
                });
                
                if (blob) {
                    const pngFilename = f.filename.replace('.jpg', '.png');
                    zip.file(pngFilename, blob);
                }

                // 🔥 THÊM 2 DÒNG NÀY: Hủy kích thước canvas lập tức để giải phóng RAM đồ họa tức thì
                tempCanvas.width = 0;
                tempCanvas.height = 0;
            }


            
            const content = await zip.generateAsync({ type: "blob" });
            const link = document.createElement('a');
            const downloadUrl = URL.createObjectURL(content);
            link.href = downloadUrl;
            link.download = "frames_extracted.zip";
            link.click();
            
            setTimeout(() => URL.revokeObjectURL(downloadUrl), 1000);

            downloadAllBtn.disabled = false;
            downloadAllBtn.innerText = originalText;
        });


        // Cho phép click vào bất kỳ vị trí nào thuộc khu vực overlay (ảnh, vùng đen, nút X) để đóng nhanh
// Thêm lệnh xóa src khi đóng overlay
overlay.addEventListener('click', () => {
    overlay.style.display = 'none';
    if (fullscreenImg.src.startsWith('blob:')) {
        URL.revokeObjectURL(fullscreenImg.src); // Thu hồi vùng nhớ ngay lập tức
        fullscreenImg.src = ''; 
    }
});


// Ngăn sự kiện đóng bị lỗi nếu lỡ bấm trượt hoặc kéo nhẹ trên máy tính
fullscreenImg.addEventListener('click', (e) => {
    // Nếu muốn bấm vào CHÍNH GIỮA ẢNH vẫn tắt được hoàn toàn giống điện thoại:
    overlay.style.display = 'none';
});

        window.addEventListener('touchstart', (e) => {
            if (e.target.closest('.controls') || e.target.closest('input') || e.target.closest('select') || e.target.closest('button')) {
                window.initialTouchY = undefined;
                return;
            }
            if (e.touches.length !== 1) return;
            window.initialTouchY = e.touches[0].clientY;
        }, { passive: true });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = (new Date()).getTime();
            if (e.target.closest('button') || e.target.closest('input') || e.target.closest('select')) return;
            if (now - lastTouchEnd <= 300) {
                if (e.cancelable) e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        
    
        // Tối ưu hóa Z-Index thông minh khi click/chạm vào các thanh Range ngầm sát nhau
                // --- LOGIC XỬ LÝ ĐA ĐIỂM VÀ TỐI ƯU HÓA Z-INDEX CHO SLIDER ---
        const handleZIndexOptimization = (clientX) => {
            const rect = rangeStart.getBoundingClientRect();
            // Tính toán tỷ lệ phần trăm vị trí nhấn trên thanh slider
            const clickPercent = (clientX - rect.left) / rect.width;
            const duration = parseFloat(rangeStart.max) || 100;
            const targetTime = clickPercent * duration;

            const distStart = Math.abs(parseFloat(rangeStart.value) - targetTime);
            const distEnd = Math.abs(parseFloat(rangeEnd.value) - targetTime);

            // Đầu kéo nào nằm gần điểm nhấn của ngón tay/chuột hơn sẽ được ưu tiên nổi lên trên
            if (distStart < distEnd) {
                rangeStart.style.zIndex = "5";
                rangeEnd.style.zIndex = "4";
            } else {
                rangeStart.style.zIndex = "4";
                rangeEnd.style.zIndex = "5";
            }
        };

        [rangeStart, rangeEnd].forEach(el => {
            // Xử lý tối ưu hóa lớp bấm ngay khi chạm/click vào vùng chồng lấn
            el.addEventListener('mousedown', (e) => handleZIndexOptimization(e.clientX));
            el.addEventListener('touchstart', (e) => {
                if (e.touches.length > 0) handleZIndexOptimization(e.touches[0].clientX);
            }, { passive: true });

            // Lắng nghe sự kiện kéo liên tục (Input Event)
            el.addEventListener('input', (e) => {
                let valStart = parseFloat(rangeStart.value);
                let valEnd = parseFloat(rangeEnd.value);
                const maxDuration = parseFloat(rangeStart.max) || 100;
                const minGap = maxDuration > 5 ? 0.5 : 0.05; // Gap thích ứng thông minh chống dính nút

                // Chặn cứng không cho đầu Start vượt qua đầu End và ngược lại
                if (e.target === rangeStart && valStart > valEnd - minGap) {
                    rangeStart.value = Math.max(0, valEnd - minGap);
                } else if (e.target === rangeEnd && valEnd < valStart + minGap) {
                    rangeEnd.value = Math.min(maxDuration, valStart + minGap);
                }

                updateInputsFromSliders();

                // Cập nhật khung hình preview trên Video Player ngay lập tức theo thời gian thực
                if (video.src && !isNaN(video.duration)) {
    // Tránh gán giá trị max tuyệt đối khi kéo tay
    const targetTime = parseFloat(e.target.value);
    video.currentTime = Math.min(targetTime, video.duration - 0.1);
}

            });
        });


        function handleManualTimeInput(inputElement, sliderElement) {
            inputElement.addEventListener('change', () => {
                const timeStr = inputElement.value.trim();
                let seconds = parseTimeToSeconds(timeStr);
                const maxDuration = parseFloat(rangeStart.max) || 0;

                if (isNaN(seconds) || seconds < 0) seconds = 0;
                if (seconds > maxDuration) seconds = maxDuration;

                sliderElement.value = seconds;
                inputElement.value = formatSeconds(seconds);

                updateInputsFromSliders();

                if (video.src) {
                    video.currentTime = parseFloat(sliderElement.value);
                }
            });

            inputElement.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    inputElement.blur(); 
                }
            });
        }

        handleManualTimeInput(startInput, rangeStart);
        handleManualTimeInput(endInput, rangeEnd);
        
        modeSelect.addEventListener('change', () => {
            if (modeSelect.value === 'interval') {
                intervalOptions.style.display = 'inline';
                randomOptions.style.display = 'none';
            } else {
                intervalOptions.style.display = 'none';
                randomOptions.style.display = 'inline';
            }
            updateFrameCount();
        });

        intervalStepInput.addEventListener('input', updateFrameCount);
        randomCountInput.addEventListener('input', updateFrameCount);
    // THÊM DÒNG NÀY VÀO CUỐI SCRIPT ĐỂ KHỞI TẠO ĐÚNG VỊ TRÍ KHI MỞ TRANG
        updateInputsFromSliders();
    
    // --- HÀM NGẮT TỰ ĐỘNG CUỘN KHI CÓ TÁC ĐỘNG TỪ NGƯỜI DÙNG ---
function stopAutoScrollOnUserInteraction() {
    if (isAutoScrolling) {
        isAutoScrolling = false;
        if (scrollIntervalId) {
            clearInterval(scrollIntervalId);
            scrollIntervalId = null;
        }
        console.log("Auto-scroll stopped by user interaction.");
    }
}

// Lắng nghe sự kiện chạm tay trên thiết bị di động (Mobile Touch)
window.addEventListener('touchstart', stopAutoScrollOnUserInteraction, { passive: true });

// Lắng nghe sự kiện cuộn chuột hoặc vuốt bánh xe (Desktop Wheel / Trackpad)
window.addEventListener('wheel', stopAutoScrollOnUserInteraction, { passive: true });

// Đề phòng trường hợp người dùng tương tác bằng phím điều hướng
window.addEventListener('keydown', (e) => {
    if (['ArrowUp', 'ArrowDown', 'Space', 'PageUp', 'PageDown'].includes(e.key)) {
        stopAutoScrollOnUserInteraction();
    }
});
        
                // Hàm bổ trợ: Chuyển đổi bitmap sang ảnh chất lượng gốc khi xem Fullscreen
        // Thay thế hàm renderHighResToElement cũ bằng bản sửa lỗi này
function renderHighResToElement(bitmap, imgElement) {
    const oldSrc = imgElement.src;
    if (oldSrc && oldSrc.startsWith('blob:')) {
        URL.revokeObjectURL(oldSrc);
    }
    
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = video.videoWidth;
    tempCanvas.height = video.videoHeight;
    const tempCtx = tempCanvas.getContext('2d');
    tempCtx.drawImage(bitmap, 0, 0);
    
    tempCanvas.toBlob((blob) => {
        if (blob) {
            imgElement.src = URL.createObjectURL(blob);
        }
    }, "image/png"); // Đảm bảo xuất ra PNG để xem Fullscreen nét nhất
}



        


                // --- QUẢN LÝ HỘP THOẠI CONTEXT MENU ---
        const ctxMenu = document.getElementById('customContextMenu');
        const ctxDownloadBtn = document.getElementById('ctxDownloadBtn');
        let currentTargetBitmap = null;
        let currentTargetFilename = '';

                function openCustomMenu(x, y, bitmap, filename) {
            currentTargetBitmap = bitmap;
            currentTargetFilename = filename;
            
            ctxMenu.style.display = 'block'; // Phải hiện menu trước để trình duyệt tính được chiều cao thực (offsetHeight)
            
            const menuWidth = ctxMenu.offsetWidth;
            const menuHeight = ctxMenu.offsetHeight;
            
            // Tính toán vị trí Y (Đẩy lên trên chỗ bấm giữ, trừ thêm 10px khoảng cách an toàn)
            let targetY = y - menuHeight - 10;
            
            // Nếu vị trí quá sát mép trên màn hình không đủ chỗ hiển thị, tự động lật xuống dưới chỗ bấm giữ
            if (targetY < 10) {
                targetY = y + 15; 
            }
            
            // Đảm bảo menu không bị tràn ra ngoài rìa bên phải màn hình
            let targetX = x;
            if (x + menuWidth > window.innerWidth) {
                targetX = window.innerWidth - menuWidth - 10;
            }
            // Đảm bảo menu không bị tràn ra ngoài rìa bên trái màn hình
            if (targetX < 10) targetX = 10;

            // Gán tọa độ mới vào CSS
            ctxMenu.style.left = `${targetX}px`;
            ctxMenu.style.top = `${targetY}px`;
        }


        // Xử lý khi nhấn nút Tải trong Menu tùy chọn
        ctxDownloadBtn.addEventListener('click', () => {
    if (!currentTargetBitmap) return;
    
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = video.videoWidth;
    tempCanvas.height = video.videoHeight;
    const tempCtx = tempCanvas.getContext('2d');
    tempCtx.drawImage(currentTargetBitmap, 0, 0);
    
    tempCanvas.toBlob((blob) => {
        if (blob) {
            const dlLink = document.createElement('a');
            dlLink.download = currentTargetFilename; // Sử dụng tên file .png gốc
            const dlUrl = URL.createObjectURL(blob);
            dlLink.href = dlUrl;
            dlLink.click();
            URL.revokeObjectURL(dlUrl);
        }
    }, "image/png"); // Thay đổi ở đây: Chuyển hoàn toàn sang image/png chất lượng cao nhất
    
    ctxMenu.style.display = 'none';
});


        // Click ra ngoài hoặc cuộn màn hình thì tự động đóng menu
        document.addEventListener('click', (e) => {
            if (!e.target.closest('#customContextMenu')) {
                ctxMenu.style.display = 'none';
            }
        });
        window.addEventListener('scroll', () => {
            ctxMenu.style.display = 'none';
        });

    </script>
