        /* --- KHỞI TẠO NỀN TẢNG GIAO DIỆN ĐỒNG BỘ --- */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 20px; 
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 0; 
            padding-bottom: 260px; 
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            overscroll-behavior-y: contain; 
            touch-action: manipulation; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        input, textarea {
            -webkit-user-select: text;
            user-select: text;
        }

            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        /* --- LOADING OVERLAY NEON --- */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #121212;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .loader-box { text-align: center; padding: 20px; max-width: 90%; }
        .spinner {
            width: 60px; height: 60px;
            border: 4px solid rgba(3, 218, 198, 0.1);
            border-top-color: #03dac6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px auto;
            box-shadow: 0 0 15px rgba(3, 218, 198, 0.2);
        }
        .loader-box h2 { color: #ffffff; font-size: 1.4em; margin: 0 0 10px 0; letter-spacing: 1px; }
        .loader-box p { color: #888888; font-size: 0.95em; margin: 0; }
        #loadingOverlay.fade-out { opacity: 0; visibility: hidden; pointer-events: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- WELCOME OVERLAY DRAG & DROP --- */
        #welcomeOverlay {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10; width: 90%; max-width: 500px;
            box-sizing: border-box; padding: 40px 20px;
            border: 2px dashed #444444; border-radius: 16px;
            background-color: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        @media (hover: hover) {
            #welcomeOverlay:hover {
                border-color: #888888; background-color: rgba(255, 255, 255, 0.03);
                transform: translate(-50%, -52%);
            }
            #welcomeOverlay:hover .upload-icon { color: #ffffff; transform: translateY(-4px); }
        }
        #welcomeOverlay.dragover {
            border-style: solid; border-color: #03dac6;
            background-color: rgba(3, 218, 198, 0.06);
            box-shadow: 0 0 30px rgba(3, 218, 198, 0.25);
            transform: translate(-50%, -50%) scale(1.02);
        }
        #welcomeOverlay.dragover .upload-icon { color: #03dac6; transform: scale(1.1); }
        .upload-icon { color: #666666; margin-bottom: 16px; transition: all 0.3s ease; display: inline-flex; align-items: center; justify-content: center; }
        #welcomeOverlay h1 { font-size: 1.8em; color: #ffffff; margin: 0 0 10px 0; text-transform: uppercase; letter-spacing: 1.5px; }
        #welcomeOverlay p { color: #888888; font-size: 0.95em; line-height: 1.5; margin: 0; }
        body.has-video #welcomeOverlay { opacity: 0; visibility: hidden; pointer-events: none; }

        /* --- VIDEO CONTAINER --- */

        /* Hàng cha điều phối không gian */
        .controls-row { 
            display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: center; 
            width: 100%; max-width: 800px; box-sizing: border-box; 
        }

        /* Khối tổng hợp thời gian (Inputs + Slider) */

            display: flex; flex-direction: column; width: 100%; gap: 10px;

        /* Đồng bộ hóa ô nhập liệu và select */

            padding: 8px 12px; background: #2d2d2d; color: white;

               /* --- KHÔI PHỤC SLIDER ĐÔI V1 (TỐI ƯU GIAO DIỆN V2) --- */
        .dual-slider-wrapper {
            position: relative;
            width: 100%;
            height: 40px;
            display: flex;
            align-items: center;
        }

        .slider-track {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            height: 6px;
            background-color: #2d2d2d;
            border-radius: 3px;
            z-index: 1;
        }

        .slider-fill {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            height: 6px;
            background: linear-gradient(90deg, #03dac6, #bb86fc);
            border-radius: 3px;
            z-index: 2;
        }

        input[type="range"] {
            position: absolute;
            width: 100%;
            height: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            pointer-events: none;
            -webkit-appearance: none;
            appearance: none;
            margin: 0;
            z-index: 3;
            outline: none;
        }

        /* Style nút kéo (Thumb) */
        input[type="range"]::-webkit-slider-thumb {
            pointer-events: all;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid #03dac6;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(3, 218, 198, 0.5);
            transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.2); }

        #rangeEnd::-webkit-slider-thumb { 
            border-color: #bb86fc; 
            box-shadow: 0 0 10px rgba(187, 134, 252, 0.5); 
        }

        /* Nút kéo cho Firefox */
        input[type="range"]::-moz-range-thumb {
            pointer-events: all;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            border: 3px solid #03dac6;
            cursor: pointer;
        }
        #rangeEnd::-moz-range-thumb { border-color: #bb86fc; }


    
    
    
    
    
    
    
    
        /* Cụm cấu hình chế độ */

        button:disabled { background-color: #444 !important; color: #888 !important; cursor: not-allowed; box-shadow: none !important; transform: none !important; }

        /* Tối ưu màn hình nhỏ dưới 480px (Mobile dọc) */
        @media (max-width: 480px) {

        /* --- GALLERY GRID (GIỐNG DANH SÁCH LƯỚI V2) --- */
        h3.gallery-title { width: 100%; max-width: 95%; margin: 20px auto 10px auto; font-size: 1.2em; color: #fff; display: none;}
        #gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 16px; width: 95%; max-width: 1200px; margin: 0 auto;

        .frame-item { 
            cursor: pointer; border: 2px solid #2d2d2d; border-radius: 10px; 
            overflow: hidden; position: relative; background: #000; 
            aspect-ratio: 16 / 9; transition: border-color 0.2s;

        .frame-item.portrait { aspect-ratio: 3 / 4 !important; }
        .frame-item:hover { border-color: #03dac6; }
        .frame-item img { width: 100%; height: 100%; object-fit: cover; display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        .frame-item .info { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: rgba(0, 0, 0, 0.85); font-size: 11px; padding: 6px 0; 
            text-align: center; color: #fff; z-index: 2; box-sizing: border-box; font-family: monospace;
        }

        /* --- FULLSCREEN OVERLAY --- */
        #fullscreenOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 2000; justify-content: center; align-items: center; cursor: zoom-out;
        }
        #fullscreenOverlay img { max-width: 95%; max-height: 95%; border: 2px solid #333; border-radius: 6px; }
        #closeBtn { position: absolute; top: 20px; right: 30px; color: #cf6679; font-size: 40px; font-weight: bold; cursor: pointer; }

    <script>
        const video = document.getElementById('videoPlayer');
        const videoInput = document.getElementById('videoInput');
        const gallery = document.getElementById('gallery');
        const galleryTitle = document.getElementById('galleryTitle');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const extractBtn = document.getElementById('extractBtn');
        const startInput = document.getElementById('start');
        const endInput = document.getElementById('end');
        const rangeStart = document.getElementById('rangeStart');
        const rangeEnd = document.getElementById('rangeEnd');
        const modeSelect = document.getElementById('modeSelect');
        const randomOptions = document.getElementById('randomOptions');
        const randomCountInput = document.getElementById('randomCount');
        const frameCountDisplay = document.getElementById('frameCount');
        const welcomeOverlay = document.getElementById('welcomeOverlay');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const overlay = document.getElementById('fullscreenOverlay');
        const fullscreenImg = document.getElementById('fullscreenImg');
    const intervalOptions = document.getElementById('intervalOptions');
const intervalStepInput = document.getElementById('intervalStep');

        // BỔ SUNG KHAI BÁO BIẾN MỚI
        const extractLoading = document.getElementById('extractLoading');
        const stopExtractBtn = document.getElementById('stopExtractBtn');
        let isExtracting = false; // Cờ kiểm tra xem có đang chạy trích xuất không
    
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        let extractedFrames = []; 
        let isPortraitVideo = false;

        // Tự động tắt màn hình chờ khi tải xong DOM cơ bản
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { loadingOverlay.classList.add('fade-out'); }, 400);
        });

        function formatSeconds(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            return [h, m, s].map(v => v.toString().padStart(2, '0')).join(':');
        }

        function parseTimeToSeconds(timeStr) {
            const parts = timeStr.replace(/[^0-9:]/g, '').split(':').reverse();
            let seconds = 0;
            if (parts[0]) seconds += parseInt(parts[0]) || 0;     
            if (parts[1]) seconds += (parseInt(parts[1]) || 0) * 60; 
            if (parts[2]) seconds += (parseInt(parts[2]) || 0) * 3600; 
            return seconds;
        }

        // Kéo thả file chuẩn chỉ như App 2
        welcomeOverlay.addEventListener('click', () => videoInput.click());
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
            welcomeOverlay.addEventListener(evt, (e) => e.preventDefault(), false);
        });
        ['dragenter', 'dragover'].forEach(evt => {
            welcomeOverlay.addEventListener(evt, () => welcomeOverlay.classList.add('dragover'), false);
        });
        ['dragleave', 'drop'].forEach(evt => {
            welcomeOverlay.addEventListener(evt, () => welcomeOverlay.classList.remove('dragover'), false);
        });
        
        welcomeOverlay.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('video/')) {
                videoInput.files = files;
                const event = new Event('change', { bubbles: true });
                videoInput.dispatchEvent(event);
            } else {
                alert("Vui lòng thả một tệp tin định dạng Video hợp lệ!");
            }
        });

        videoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                video.src = URL.createObjectURL(file);
                video.style.display = 'block';
                document.body.classList.add('has-video');
                gallery.innerHTML = '';
                galleryTitle.style.display = 'none';
                downloadAllBtn.style.display = 'none';
            }
        });

        video.onloadedmetadata = () => {
            const duration = video.duration;
            rangeStart.max = duration;
            rangeEnd.max = duration;
            rangeStart.value = 0;
            rangeEnd.value = Math.min(duration, 5);
            
            if (video.videoHeight > video.videoWidth) {
                video.classList.add('portrait');
                isPortraitVideo = true;
            } else {
                video.classList.remove('portrait');
                isPortraitVideo = false;
            }
            
                        extractBtn.disabled = false;
            updateInputsFromSliders(); // Hàm này bên trong đã tự gọi updateFrameCount()

        };

    
    
                function updateInputsFromSliders() {
    let valStart = parseFloat(rangeStart.value);
    let valEnd = parseFloat(rangeEnd.value);
    const minGap = 5; // Khoảng cách tối thiểu 5 giây giữa 2 nút
    const maxDuration = parseFloat(rangeStart.max) || 100;

    // Khóa va chạm chặn kéo ngược / giữ khoảng cách 5s
    if (valStart > valEnd - minGap) {
        // Nếu người dùng đang kéo start vượt quá giới hạn
        if (document.activeElement === rangeStart) {
            rangeStart.value = valEnd - minGap;
            valStart = valEnd - minGap;
        } else {
            rangeEnd.value = valStart + minGap;
            valEnd = valStart + minGap;
        }
    }

    // Tính toán % để fill dải màu gradient mượt mà đúng chuẩn v1
    const percent1 = (rangeStart.value / maxDuration) * 100;
    const percent2 = (rangeEnd.value / maxDuration) * 100;

    sliderFill.style.left = percent1 + "%";
    sliderFill.style.width = (percent2 - percent1) + "%";

    // Đồng bộ text box
    startInput.value = formatSeconds(rangeStart.value);
    endInput.value = formatSeconds(rangeEnd.value);
    updateFrameCount();
}



                function updateFrameCount() {
            const start = parseTimeToSeconds(startInput.value);
            const end = parseTimeToSeconds(endInput.value);
            
            // Nếu chưa chọn video thì giữ nguyên thông báo gốc
            if (!video.src || extractBtn.disabled && !isExtracting) {
                extractBtn.innerText = "Chọn Video Trước";
                frameCountDisplay.innerText = "";
                return;
            }

            if (!isNaN(start) && !isNaN(end) && end >= start) {
                let count = 0;
                if (modeSelect.value === 'interval') {
                    const step = parseFloat(intervalStepInput.value) || 0.5;
                    count = Math.floor((end - start) / step) + 1;
                } else {
                    count = parseInt(randomCountInput.value) || 0;
                }
                
                // Cập nhật trực tiếp số lượng ảnh vào nút bấm chính
                extractBtn.innerText = `Trích xuất khung hình (${count} ảnh)`;
                // Xóa nội dung trong span cũ để đỡ bị lặp thông tin trên giao diện
                frameCountDisplay.innerText = ""; 
            }
        }



        function captureFrame(time) {
            return new Promise((resolve) => {
                const onSeeked = () => {
                    video.removeEventListener('seeked', onSeeked);
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob(blob => resolve(blob), "image/png");
                };
                video.addEventListener('seeked', onSeeked);
                video.currentTime = time;
            });
        }

                // Biến kiểm tra lệnh dừng từ người dùng bên ngoài vòng lặp
        let shouldStopExtract = false;

        stopExtractBtn.addEventListener('click', () => {
            shouldStopExtract = true;
            stopExtractBtn.innerText = "⏳ Đang dừng...";
            stopExtractBtn.disabled = true;
        });

        extractBtn.addEventListener('click', async () => {
            const startTime = parseTimeToSeconds(startInput.value);
            const endTime = parseTimeToSeconds(endInput.value);
            if (endTime <= startTime) return alert("Thời gian kết thúc phải lớn hơn bắt đầu!");

            // 1. Reset trạng thái ban đầu
            shouldStopExtract = false;
            stopExtractBtn.innerText = "DỪNG TRÍCH XUẤT";
            stopExtractBtn.disabled = false;
            
            gallery.innerHTML = '';
            extractedFrames = [];
            downloadAllBtn.style.display = 'none';
            galleryTitle.style.display = 'none';

            // 2. Hiện khu vực vòng xoay + nút Stop, khóa nút trích xuất chính
            extractLoading.style.display = 'block';
            extractBtn.disabled = true;

            // Tính toán danh sách mốc thời gian (giữ nguyên logic gốc của bạn)
            let timestamps = [];
            if (modeSelect.value === 'interval') {
                const step = parseFloat(intervalStepInput.value) || 0.5;
                for (let t = startTime; t <= endTime; t += step) {
                    timestamps.push(t);
                }
            } else {
                const count = parseInt(randomCountInput.value);
                for (let i = 0; i < count; i++) {
                    timestamps.push(Math.random() * (endTime - startTime) + startTime);
                }
                timestamps.sort((a, b) => a - b);
            }

            // Cuộn màn hình nhẹ xuống vùng đang xử lý để người dùng thấy tiến trình
            window.scrollTo({ top: extractLoading.offsetTop - 20, behavior: 'smooth' });

            // 3. Vòng lặp trích xuất từng khung hình
            for (const t of timestamps) {
                // Kiểm tra xem người dùng có bấm nút STOP hay không trước mỗi khung hình
                if (shouldStopExtract) {
                    break; 
                }

                const blob = await captureFrame(t);
                const filename = `frame_${t.toFixed(2)}s.png`;
                const url = URL.createObjectURL(blob);
                extractedFrames.push({ blob, filename });

                // Hiển thị ảnh dần lên lưới ngay khi trích xuất xong (Tăng trải nghiệm real-time)
                if (galleryTitle.style.display === 'none') {
                    galleryTitle.style.display = 'block';
                }

                const div = document.createElement('div');
                div.className = 'frame-item';
                if (isPortraitVideo) div.classList.add('portrait');
                
                const img = document.createElement('img');
                img.src = url;
                img.onclick = () => {
                    fullscreenImg.src = url;
                    overlay.style.display = 'flex';
                };
                
                const info = document.createElement('div');
                info.className = 'info';
                info.innerText = `${t.toFixed(2)}s`;
                
                div.appendChild(img);
                div.appendChild(info);
                gallery.appendChild(div);
            }

            // 4. Dọn dẹp giao diện sau khi kết thúc (Dù hoàn thành hay bị bấm Stop)
            extractLoading.style.display = 'none';
            extractBtn.disabled = false;

            if (extractedFrames.length > 0) {
                downloadAllBtn.style.display = 'inline-block';
            } else {
                galleryTitle.style.display = 'none';
            }
        });


        downloadAllBtn.addEventListener('click', async () => {
            const originalText = downloadAllBtn.innerText;
            downloadAllBtn.disabled = true;
            downloadAllBtn.innerText = "⏳ Đang nén ZIP...";
            
            const zip = new JSZip();
            extractedFrames.forEach(f => zip.file(f.filename, f.blob));
            const content = await zip.generateAsync({ type: "blob" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(content);
            link.download = "frames_extracted.zip";
            link.click();
            
            downloadAllBtn.disabled = false;
            downloadAllBtn.innerText = originalText;
        });

        overlay.addEventListener('click', () => overlay.style.display = 'none');

        // --- ANTI PULL-TO-REFRESH & ANTI ZOOM GIỐNG APP VIDEO ---
          window.addEventListener('touchstart', (e) => {
            // Nếu chạm vào thanh điều khiển hoặc các thẻ input/button, hủy xử lý chặn cuộn kéo của window
            if (e.target.closest('.controls') || e.target.closest('input') || e.target.closest('select') || e.target.closest('button')) {
                window.initialTouchY = undefined;
                return;
            }
            if (e.touches.length !== 1) return;
            window.initialTouchY = e.touches[0].clientY;
        }, { passive: true });

             



        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = (new Date()).getTime();
            if (e.target.closest('button') || e.target.closest('input') || e.target.closest('select')) return;
            if (now - lastTouchEnd <= 300) {
                if (e.cancelable) e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        document.addEventListener('contextmenu', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            e.preventDefault();
        }, false);
    
    // --- LOGIC DI CHUYỂN NÚT TRÒN GẦN NHẤT KHI BẤM VÀO THANH TRƯỢT & VUỐT MƯỢT MÀ ---
    const sliderContainer = document.querySelector('.slider-container');
    let activeSlider = null; // Lưu trữ input range nào đang được kéo

    // Lắng nghe sự kiện kéo trực tiếp trên slider của v1
[rangeStart, rangeEnd].forEach(el => {
    el.oninput = (e) => {
        // Đẩy độ ưu tiên hiển thị (Z-index) nút đang được kéo lên trên
        if (e.target === rangeStart) {
            rangeStart.style.zIndex = 4;
            rangeEnd.style.zIndex = 3;
        } else {
            rangeStart.style.zIndex = 3;
            rangeEnd.style.zIndex = 4;
        }

        updateInputsFromSliders();

        // Tua video theo nút đang kéo
        if (video.src) {
            video.currentTime = parseFloat(e.target.value);
        }
    };
});


        // --- TỰ ĐỘNG TUA VIDEO KHI NHẬP THỜI GIAN THỦ CÔNG ---
    function handleManualTimeInput(inputElement, sliderElement) {
        inputElement.addEventListener('change', () => {
            const timeStr = inputElement.value.trim();
            let seconds = parseTimeToSeconds(timeStr);
            const maxDuration = parseFloat(rangeStart.max) || 0;

            // Kiểm tra giới hạn thời lượng video
            if (isNaN(seconds) || seconds < 0) seconds = 0;
            if (seconds > maxDuration) seconds = maxDuration;

            // Đồng bộ lại giá trị lên thanh trượt slider
            sliderElement.value = seconds;

            // Cập nhật lại định dạng chuẩn chỉnh (phòng trường hợp người dùng nhập thiếu số)
            inputElement.value = formatSeconds(seconds);

            // Kiểm tra va chạm khoảng cách 5 giây và đồng bộ ô còn lại
            updateInputsFromSliders();

            // Tua video đến vị trí vừa nhập
            if (video.src) {
                video.currentTime = parseFloat(sliderElement.value);
            }
        });

        // Hỗ trợ nhấn Enter để xác nhận tua ngay lập tức thay vì đợi mất focus
        inputElement.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                inputElement.blur(); // Kích hoạt sự kiện 'change'
            }
        });
    }

    // Kích hoạt tính năng cho cả 2 ô nhập liệu
    handleManualTimeInput(startInput, rangeStart);
    handleManualTimeInput(endInput, rangeEnd);
    
    modeSelect.addEventListener('change', () => {
    if (modeSelect.value === 'interval') {
        intervalOptions.style.display = 'inline';
        randomOptions.style.display = 'none';
    } else {
        intervalOptions.style.display = 'none';
        randomOptions.style.display = 'inline';
    }
    updateFrameCount();
});

// Lắng nghe sự kiện người dùng thay đổi số giây để cập nhật số lượng ảnh dự kiến ngay lập tức
intervalStepInput.addEventListener('input', updateFrameCount);
randomCountInput.addEventListener('input', updateFrameCount);

    
    

    </script>
