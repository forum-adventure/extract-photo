<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản lý Nhiệm vụ Hàng ngày</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nhiệm Vụ">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/906/906334.png">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #64748b; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; --card-bg: #ffffff; --text-main: #1e293b; --text-muted: #64748b; --border: #cbd5e1; --input-bg: #ffffff; --modal-overlay: rgba(0,0,0,0.5); }
        [data-theme="dark"] { --bg: #0f172a; --card-bg: #1e293b; --text-main: #f1f5f9; --text-muted: #94a3b8; --border: #334155; --input-bg: #1e293b; --modal-overlay: rgba(0,0,0,0.7); }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text-main); display: flex; flex-direction: column; align-items: center; padding: calc(env(safe-area-inset-top) + 20px) 20px 20px 20px; transition: background 0.3s, color 0.3s; margin: 0; }
        .theme-toggle { margin-bottom: 20px; padding: 8px 16px; cursor: pointer; background: var(--card-bg); border: 1px solid var(--border); color: var(--text-main); border-radius: 20px; font-weight: 600; }
        .container { background: var(--card-bg); padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; max-width: 600px; box-sizing: border-box; }
        h2 { text-align: center; margin-top: 0; }
        .current-date { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .input-sub-group { display: flex; gap: 10px; }
        textarea#task-input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--input-bg); color: var(--text-main); font-size: 16px; outline: none; width: 100%; box-sizing: border-box; font-family: inherit; resize: none; min-height: 46px; max-height: 150px; }
        select { padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--input-bg); color: var(--text-main); font-size: 16px; flex: 1; }
        button#add-btn { flex: 1; padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .task-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid var(--border); transition: 0.4s; }
        .fall-out { opacity: 0; transform: scale(0.9) translateY(10px); pointer-events: none; margin-bottom: -45px; }
        .editable-text { margin-left: 10px; flex: 1; word-break: break-word; outline: none; }
        .badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; margin-left: 10px; font-weight: bold; }
        .badge-main { background: #fee2e2; color: #ef4444; }
        .badge-sub { background: #e0f2fe; color: #0ea5e9; }
        .history-section { margin-top: 30px; border-top: 2px solid var(--border); padding-top: 20px; }
        .history-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .history-column { background: rgba(0,0,0,0.02); padding: 10px; border-radius: 8px; min-height: 100px; }
        [data-theme="dark"] .history-column { background: rgba(255,255,255,0.02); }
        .column-title { font-size: 0.85rem; font-weight: bold; text-align: center; margin-bottom: 10px; color: var(--text-muted); }
        .completed-task { color: var(--text-muted); font-size: 0.85rem; flex: 1; display: flex; flex-direction: column; line-height: 1.2; }
        .task-main-info { display: flex; align-items: flex-start; gap: 4px; text-decoration: line-through; }
        .task-date { font-size: 0.65rem; opacity: 0.6; margin-top: 2px; text-decoration: none !important; display: block; }
        .delete-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; padding: 0 5px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .modal-card { background: var(--card-bg); padding: 20px; border-radius: 12px; width: 100%; max-width: 300px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-modal { flex: 1; padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: var(--border); color: var(--text-main); }
        .btn-confirm { background: var(--danger); color: white; }
    </style>
</head>
<body>

<button class="theme-toggle" id="theme-toggle">🌙 Chế độ tối</button>

<div class="container">
    <h2>Nhiệm Vụ Hôm Nay</h2>
    <div class="current-date" id="display-date"></div>
    <div class="input-group">
        <textarea id="task-input" placeholder="Nhập nhiệm vụ mới..." rows="1"></textarea>
        <div class="input-sub-group">
            <select id="task-type">
                <option value="Chính">⭐ Nhiệm vụ Chính</option>
                <option value="Phụ">🔹 Nhiệm vụ Phụ</option>
            </select>
            <button id="add-btn">THÊM</button>
        </div>
    </div>
    <div id="active-tasks"></div>
    <div class="history-section">
        <div class="history-grid">
            <div class="history-column"><div class="column-title" style="color: var(--danger);">⭐ CHÍNH</div><div id="history-main"></div></div>
            <div class="history-column"><div class="column-title" style="color: var(--primary);">🔹 PHỤ</div><div id="history-sub"></div></div>
        </div>
    </div>
</div>

<div id="delete-modal" class="modal-overlay">
    <div class="modal-card">
        <p style="margin: 0; font-weight: 500;">Xoá nhiệm vụ này?</p>
        <div class="modal-btns">
            <button class="btn-modal btn-cancel" onclick="window.closeModal()">Huỷ</button>
            <button class="btn-modal btn-confirm" id="confirm-delete-btn">Xoá</button>
        </div>
    </div>
</div>

<script type="module">
    // Firebase Imports
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    // Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyAo20_qTCtXl2wkspgi8PpJLaPpgTY_dKM",
        authDomain: "my-todo-sync-401c3.firebaseapp.com",
        projectId: "my-todo-sync-401c3",
        storageBucket: "my-todo-sync-401c3.firebasestorage.app",
        messagingSenderId: "892634573514",
        appId: "1:892634573514:web:264e1eace6153399252233"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    let userId = null;

    // Các biến toàn cục để script thường truy cập được
    window.tasks = JSON.parse(localStorage.getItem('myTasks')) || [];
    
    // Đăng nhập ẩn danh và sync
    signInAnonymously(auth).then((userCred) => {
        userId = userCred.user.uid;
        // Lắng nghe dữ liệu realtime
        onSnapshot(doc(db, "tasks", userId), (docSnap) => {
            if (docSnap.exists()) {
                window.tasks = docSnap.data().list;
                localStorage.setItem('myTasks', JSON.stringify(window.tasks));
                window.render();
            }
        });
    });

    // Hàm cập nhật lên cloud
    window.syncToCloud = async () => {
        if(userId) {
            await setDoc(doc(db, "tasks", userId), { list: window.tasks });
        }
    };
</script>

<script>
    const taskInput = document.getElementById('task-input');
    const taskType = document.getElementById('task-type');
    const addBtn = document.getElementById('add-btn');
    const activeDiv = document.getElementById('active-tasks');
    const historyMainDiv = document.getElementById('history-main');
    const historySubDiv = document.getElementById('history-sub');
    const themeToggle = document.getElementById('theme-toggle');
    const displayDate = document.getElementById('display-date');
    const deleteModal = document.getElementById('delete-modal');
    const confirmDeleteBtn = document.getElementById('confirm-delete-btn');

    let currentDeleteId = null;
    displayDate.innerText = new Date().toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const finishSound = new Audio('./pop.wav');
    finishSound.volume = 0.4;

    taskInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; });

    if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeToggle.innerText = '☀️ Chế độ sáng';
    }

    themeToggle.addEventListener('click', () => {
        let isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        localStorage.setItem('theme', isDark ? 'light' : 'dark');
        themeToggle.innerText = isDark ? '🌙 Chế độ tối' : '☀️ Chế độ sáng';
    });

    function saveAndRender() {
        localStorage.setItem('myTasks', JSON.stringify(window.tasks));
        if(window.syncToCloud) window.syncToCloud();
        render();
    }

    function addTask() {
        const text = taskInput.value.trim();
        if (!text) return;
        window.tasks.push({ id: Date.now(), text, type: taskType.value, completed: false, date: new Date().toLocaleDateString('vi-VN') });
        taskInput.value = "";
        taskInput.style.height = 'auto';
        saveAndRender();
    }

    function toggleTask(id, event) {
        const el = event.target.closest('.task-item');
        window.tasks = window.tasks.map(t => {
            if (t.id === id) {
                if (!t.completed) {
                    finishSound.currentTime = 0; finishSound.play().catch(()=>{});
                    const rect = event.target.getBoundingClientRect();
                    confetti({ particleCount: 100, spread: 60, origin: { x: (rect.left + rect.width/2)/window.innerWidth, y: (rect.top + rect.height/2)/window.innerHeight } });
                    if (el) el.classList.add('fall-out');
                }
                return {...t, completed: !t.completed};
            }
            return t;
        });
        setTimeout(saveAndRender, 400);
    }

    window.openDeleteModal = (id) => { currentDeleteId = id; deleteModal.style.display = 'flex'; };
    window.closeModal = () => { deleteModal.style.display = 'none'; currentDeleteId = null; };

    confirmDeleteBtn.onclick = () => {
        if (currentDeleteId) {
            window.tasks = window.tasks.filter(t => t.id !== currentDeleteId);
            saveAndRender();
            window.closeModal();
        }
    };

    function updateTaskText(id, newText) {
        window.tasks = window.tasks.map(t => t.id === id ? {...t, text: newText} : t);
        if(window.syncToCloud) window.syncToCloud();
        localStorage.setItem('myTasks', JSON.stringify(window.tasks));
    }

    window.render = function() {
        activeDiv.innerHTML = ""; historyMainDiv.innerHTML = ""; historySubDiv.innerHTML = "";
        window.tasks.filter(t => !t.completed).forEach(t => {
            const item = document.createElement('div');
            item.className = 'task-item';
            item.innerHTML = `<input type="checkbox" onclick="toggleTask(${t.id}, event)"><span class="editable-text" contenteditable="true" onblur="updateTaskText(${t.id}, this.innerText)">${t.text}</span><span class="badge ${t.type === 'Chính' ? 'badge-main' : 'badge-sub'}">${t.type}</span>`;
            activeDiv.appendChild(item);
        });
        window.tasks.filter(t => t.completed).sort((a,b) => b.id - a.id).forEach(t => {
            const item = document.createElement('div');
            item.className = 'task-item';
            item.style.padding = "8px 5px";
            item.innerHTML = `<div class="completed-task"><div class="task-main-info"><span>✓</span><span>${t.text}</span></div><span class="task-date">${t.date || ''}</span></div><button class="delete-btn" onclick="window.openDeleteModal(${t.id})">×</button>`;
            (t.type === 'Chính' ? historyMainDiv : historySubDiv).appendChild(item);
        });
        const emptyMsg = "<p style='text-align:center; font-size:0.7rem; opacity:0.4; margin-top:10px;'>Trống</p>";
        if (!historyMainDiv.innerHTML) historyMainDiv.innerHTML = emptyMsg;
        if (!historySubDiv.innerHTML) historySubDiv.innerHTML = emptyMsg;
    }

    addBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addTask(); } });
    window.render();

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('Offline mode failed', err)); });
    }
</script>
</body>
</html>
